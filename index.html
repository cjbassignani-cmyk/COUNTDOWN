<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to Sunday 6PM</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}
.container {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.title {
  font-size: 1.5rem;
  margin-bottom: 20px;
  color: #94a3b8;
}
.clock {
  font-size: 3.5rem;
  font-weight: bold;
  letter-spacing: 2px;
}
.subtitle {
  margin-top: 15px;
  font-size: 1rem;
  color: #cbd5f5;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">Countdown to Sunday, April 19 @ 6:00 PM</div>
  <div class="clock" id="countdown">Loading...</div>
  <div class="subtitle">Live synchronized countdown</div>
</div>

<script>
const endTime = new Date("2026-04-19T18:00:00-04:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = endTime - now;

  if (distance <= 0) {
    document.getElementById("countdown").innerHTML = "00:00:00:00";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    String(days).padStart(2, "0") + ":" +
    String(hours).padStart(2, "0") + ":" +
    String(minutes).padStart(2, "0") + ":" +
    String(seconds).padStart(2, "0");
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
